
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #dce8f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
  }

  .banner {
    width: 520px;
    height: 520px;
    background: #ffffff;
    border: 2px solid #b8d8f0;
    border-radius: 22px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 36px;
    text-align: center;
    box-shadow: 0 12px 60px rgba(100,170,230,0.18), 0 2px 12px rgba(100,170,230,0.10);
  }

  /* Soft background circles */
  .bg-circle1 {
    position: absolute;
    top: -80px;
    right: -80px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,185,255,0.18) 0%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
  }
  .bg-circle2 {
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,185,255,0.13) 0%, transparent 70%);
    animation: breathe 5s ease-in-out infinite reverse;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* Dot grid */
  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(100,170,230,0.18) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.7;
  }

  /* Top accent line */
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #64b9ff, #2196f3, #64b9ff);
    border-radius: 22px 22px 0 0;
  }

  /* Lightning icon */
  .icon-wrap {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #2196f3, #64b9ff);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 14px;
    box-shadow: 0 6px 24px rgba(33,150,243,0.28);
    opacity: 0;
    animation: fadeUp 0.5s 0.2s forwards;
    position: relative;
    z-index: 2;
  }

  /* Telegram chip */
  .tg-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e8f4ff;
    border: 1.5px solid #b0d8f7;
    color: #2196f3;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 100px;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.5s 0.4s forwards;
    position: relative;
    z-index: 2;
  }

  /* Headline */
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 0.95;
    color: #1565c0;
    letter-spacing: 3px;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.5s 0.55s forwards;
    position: relative;
    z-index: 2;
  }
  .headline span {
    color: #2196f3;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, #64b9ff, #2196f3);
    border-radius: 99px;
    margin: 12px auto;
    opacity: 0;
    animation: fadeUp 0.5s 0.7s forwards;
    position: relative;
    z-index: 2;
  }

  /* Sub text */
  .sub {
    font-size: 15px;
    color: #5a7fa8;
    line-height: 1.55;
    max-width: 340px;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.5s 0.8s forwards;
    font-weight: 500;
    position: relative;
    z-index: 2;
  }

  /* Pills */
  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 26px;
    opacity: 0;
    animation: fadeUp 0.5s 0.95s forwards;
    position: relative;
    z-index: 2;
  }
  .pill {
    background: #e8f4ff;
    border: 1.5px solid #b0d8f7;
    color: #1976d2;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 100px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* CTA */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #2196f3, #1565c0);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2.5px;
    padding: 13px 32px;
    border-radius: 10px;
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 0.5s 1.1s forwards;
    position: relative;
    z-index: 2;
    box-shadow: 0 6px 28px rgba(33,150,243,0.32);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    border: none;
  }
  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 36px rgba(33,150,243,0.44);
  }

  /* FREE badge */
  .free-badge {
    position: absolute;
    top: 22px;
    right: 22px;
    background: #2196f3;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    padding: 4px 14px;
    border-radius: 6px;
    letter-spacing: 2px;
    z-index: 5;
    animation: badgePop 0.5s 1.3s both cubic-bezier(0.36,0.07,0.19,0.97);
    box-shadow: 0 3px 14px rgba(33,150,243,0.3);
  }
  @keyframes badgePop {
    0% { transform: scale(0) rotate(-8deg); opacity: 0; }
    80% { transform: scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(14px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="banner">
  <div class="dot-grid"></div>
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>
  <div class="top-line"></div>

  <div class="free-badge">100% FREE</div>

  <div class="icon-wrap">⚡</div>

  <div class="tg-chip">✈ @thunderstudy</div>

  <div class="headline">THUNDER<br><span>STUDY</span></div>

  <div class="divider"></div>

  <div class="sub">
    Best study material, books, notes, PDFs &amp; more —<br>all in one place, completely free!
  </div>

  <div class="pills">
    <div class="pill">📘 Books</div>
    <div class="pill">📝 Notes</div>
    <div class="pill">📄 PDFs</div>
    <div class="pill">🎯 Guides</div>
    <div class="pill">🔥 More</div>
  </div>

  <a class="cta" href="https://t.me/thunderstudy" target="_blank">
    ✈ JOIN NOW ON TELEGRAM
  </a>
</div>
</body>
</html>
